<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>镍矿石计算器</title>
<style>
:root {
  --bg: #1a1a1e; --card: #252530; --card2: #2a2a38; --text: #e0e0e0; --text2: #a0a0b0;
  --ni: #50c878; --ni-light: #7defa0; --ni-dark: #2e7d4f;
  --gold: #daa520; --accent: #4ecdc4; --danger: #e05555; --border: #3a3a48; --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; justify-content:center; padding:16px; }
.container { width:100%; max-width:520px; }
.header { text-align:center; padding:24px 0 16px; }
.header h1 { font-size:2.2rem; font-weight:900; background:linear-gradient(135deg,var(--ni-light),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.header .subtitle { font-size:0.8rem; color:var(--text2); margin-top:4px; }
.price-card { border:1px solid var(--ni-dark); border-radius:var(--radius); padding:18px; text-align:center; margin-bottom:16px; background:linear-gradient(135deg,#1a241e,#1a1e22); }
.price-card .label { font-size:0.75rem; color:var(--text2); margin-bottom:6px; }
.price-card .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
.price-card .dot.live { background:#4caf50; }
.price-card .dot.cache { background:#ff9800; }
.price-card .value { font-size:2rem; font-weight:800; color:var(--ni-light); }
.price-card .unit { font-size:0.8rem; font-weight:400; color:var(--text2); }
.price-card .meta { font-size:0.65rem; color:var(--text2); margin-top:4px; }
.price-error { color:var(--danger); font-size:0.7rem; }
.calc-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
.calc-card h2 { font-size:0.85rem; font-weight:600; color:var(--text2); margin-bottom:14px; }
.grade-row { margin-bottom:14px; }
.grade-row label { display:flex; justify-content:space-between; font-size:0.8rem; color:var(--text2); margin-bottom:8px; }
.grade-row .val { font-weight:800; color:var(--ni-light); font-size:1.1rem; }
input[type=range] { -webkit-appearance:none; width:100%; height:8px; border-radius:4px; outline:none; background:linear-gradient(90deg,var(--ni-dark),var(--ni-light)); }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:32px; height:32px; border-radius:50%; border:3px solid #fff; cursor:pointer; background:var(--ni-light); box-shadow:0 2px 10px rgba(80,200,120,0.4); }
.presets { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:14px; }
.presets button { background:var(--card2); border:1px solid var(--border); color:var(--text2); padding:4px 10px; border-radius:16px; font-size:0.68rem; cursor:pointer; transition:all 0.2s; }
.presets button:hover { border-color:var(--ni); color:var(--ni-light); }
.ore-type { display:flex; gap:6px; margin-bottom:14px; }
.ore-type button { flex:1; padding:10px 8px; border:1px solid var(--border); background:var(--card2); color:var(--text2); border-radius:10px; font-size:0.75rem; cursor:pointer; transition:all 0.2s; }
.ore-type button.active { border-color:var(--ni); background:rgba(80,200,120,0.12); color:var(--ni-light); font-weight:700; }
.param-row { display:flex; gap:10px; margin-bottom:14px; }
.param-item { flex:1; background:var(--card2); border-radius:8px; padding:10px 12px; text-align:center; }
.param-item .lbl { font-size:0.65rem; color:var(--text2); margin-bottom:4px; }
.param-item .v { font-size:1.1rem; font-weight:700; color:var(--accent); }
.param-item input { background:var(--bg); border:1px solid var(--border); color:var(--text); width:90px; padding:4px 8px; border-radius:6px; font-size:0.78rem; text-align:center; }
.tax-toggle { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--card2); border-radius:8px; margin-bottom:14px; }
.tax-toggle .lbl { font-size:0.75rem; color:var(--text2); }
.toggle-sw { position:relative; width:44px; height:24px; }
.toggle-sw input { opacity:0; width:0; height:0; }
.toggle-sw .slider { position:absolute; inset:0; background:#444; border-radius:12px; cursor:pointer; transition:0.3s; }
.toggle-sw .slider:before { content:""; position:absolute; width:18px; height:18px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:0.3s; }
.toggle-sw input:checked + .slider { background:var(--accent); }
.toggle-sw input:checked + .slider:before { transform:translateX(20px); }
.result { text-align:center; padding:20px 0 8px; }
.result .lbl { font-size:0.75rem; color:var(--text2); margin-bottom:6px; }
.result .price { font-size:2.8rem; font-weight:900; color:var(--ni-light); letter-spacing:-1px; }
.result .price .unit { font-size:1rem; font-weight:400; color:var(--text2); margin-left:4px; }
.breakdown { font-size:0.68rem; color:var(--text2); margin-top:8px; line-height:1.5; word-break:break-all; }
.disclaimer { text-align:center; font-size:0.6rem; color:var(--text2); padding:12px 0; border-top:1px solid var(--border); margin-top:8px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>镍矿石计算器</h1>
    <div class="subtitle">基于SMM 1#电解镍现货行情</div>
  </div>

  <div class="price-card">
    <div class="label"><span class="dot cache" id="dotNi"></span>SMM 1#电解镍现货价</div>
    <div class="value" id="priceNi">--<span class="unit">元/吨</span></div>
    <div class="meta" id="metaNi">加载中...</div>
  </div>

  <div class="ore-type">
    <button class="active" onclick="setOreType('laterite')">红土镍矿</button>
    <button onclick="setOreType('sulfide')">硫化镍矿</button>
  </div>

  <div class="calc-card">
    <h2>矿石参数</h2>
    <div class="grade-row">
      <label>镍品位 Ni% <span class="val" id="gradeVal">1.80</span>%</label>
      <input type="range" id="niGrade" min="0.5" max="3.0" step="0.05" value="1.80" oninput="calc()">
    </div>
    <div class="presets" id="gradePresets"></div>
    <div class="param-row">
      <div class="param-item">
        <div class="lbl">计价系数</div>
        <div class="v" id="coeff">88.0%</div>
      </div>
      <div class="param-item">
        <div class="lbl">冶炼加工费 TC (元/吨)</div>
        <input type="number" id="tc" value="800" min="0" max="5000" step="50" oninput="calc()">
      </div>
    </div>
    <div class="param-row">
      <div class="param-item">
        <div class="lbl">汇率 (USD/CNY)</div>
        <input type="number" id="exchangeRate" value="7.25" min="6.5" max="8.0" step="0.01" oninput="calc()">
      </div>
      <div class="param-item">
        <div class="lbl">水分 H&#x2082;O%</div>
        <input type="number" id="moisture" value="35" min="20" max="45" step="1" oninput="calc()">
      </div>
    </div>
    <div class="tax-toggle">
      <span class="lbl" id="taxLabel">含税模式 (&divide;1.13)</span>
      <label class="toggle-sw"><input type="checkbox" id="taxMode" checked onchange="calc()"><span class="slider"></span></label>
    </div>
  </div>

  <div class="calc-card">
    <div class="result">
      <div class="lbl">矿石计价</div>
      <div class="price" id="orePrice">0<span class="unit">元/吨</span></div>
    </div>
    <div class="breakdown" id="breakdown"></div>
  </div>

  <div class="disclaimer">⚠ 仅供参考，实际交易以合同准<br>
    数据来源：SMM上海有色网 · AKShare
  </div>

</div>

<script>
var LATERITE_COEFF = [
  [0.5,75],[0.8,78],[1.0,80],[1.2,82],[1.4,84],
  [1.5,85],[1.6,86],[1.7,87],[1.8,88],[2.0,89],
  [2.2,90],[2.5,91],[3.0,92]
];
var SULFIDE_COEFF = [
  [0.5,80],[0.8,83],[1.0,85],[1.2,87],[1.4,88],
  [1.5,89],[1.6,90],[1.7,90],[1.8,91],[2.0,92],
  [2.2,93],[2.5,94],[3.0,95]
];
var currentOreType = 'laterite';
var niPrice = 127800;

function getCoeff(table, grade) {
  if (grade <= table[0][0]) return table[0][1];
  if (grade >= table[table.length-1][0]) return table[table.length-1][1];
  for (var i = 0; i < table.length - 1; i++) {
    if (grade >= table[i][0] && grade <= table[i+1][0]) {
      var t = (grade - table[i][0]) / (table[i+1][0] - table[i][0]);
      return table[i][1] + t * (table[i+1][1] - table[i][1]);
    }
  }
  return table[table.length-1][1];
}

function setOreType(type) {
  currentOreType = type;
  document.querySelectorAll('.ore-type button').forEach(function(b, i) {
    b.classList.toggle('active', (i === 0 && type === 'laterite') || (i === 1 && type === 'sulfide'));
  });
  buildPresets();
  calc();
}

function buildPresets() {
  var el = document.getElementById('gradePresets');
  el.innerHTML = '';
  var grades = currentOreType === 'laterite'
    ? [0.8, 1.0, 1.2, 1.4, 1.5, 1.6, 1.8, 2.0, 2.5]
    : [0.8, 1.0, 1.2, 1.5, 1.8, 2.0, 2.5, 3.0];
  grades.forEach(function(g) {
    var b = document.createElement('button');
    b.textContent = g.toFixed(1) + '%';
    b.onclick = function() { document.getElementById('niGrade').value = g; calc(); };
    el.appendChild(b);
  });
}

function calc() {
  var grade = parseFloat(document.getElementById('niGrade').value);
  var tc = parseFloat(document.getElementById('tc').value) || 800;
  var exchangeRate = parseFloat(document.getElementById('exchangeRate').value) || 7.25;
  var moisture = parseFloat(document.getElementById('moisture').value) || 35;
  var exVat = document.getElementById('taxMode').checked;
  var divider = exVat ? 1.13 : 1;
  var coeffTable = currentOreType === 'laterite' ? LATERITE_COEFF : SULFIDE_COEFF;
  var coeff = getCoeff(coeffTable, grade);

  document.getElementById('gradeVal').textContent = grade.toFixed(2);
  document.getElementById('coeff').textContent = coeff.toFixed(1) + '%';
  document.getElementById('taxLabel').textContent = exVat ? '含税模式 ('÷1.13)' : '不含税模式 (直接计算)';

  var metalValue, formula;
  var priceStr = niPrice.toLocaleString();
  var vatStr = exVat ? ' ÷1.13' : '';
  if (currentOreType === 'laterite') {
    metalValue = (niPrice / divider) * (grade / 100) * (coeff / 100) * (1 - moisture / 100);
    formula = 'SMM ' + priceStr + vatStr + ' × ' + grade.toFixed(2) + '% × ' + coeff.toFixed(1) + '% × (1-' + moisture + '%水分)';
  } else {
    metalValue = (niPrice / divider) * (grade / 100) * (coeff / 100);
    formula = 'SMM ' + priceStr + vatStr + ' × ' + grade.toFixed(2) + '% × ' + coeff.toFixed(1) + '%';
  }
  var orePrice = metalValue - tc;
  if (orePrice < 0) orePrice = 0;
  document.getElementById('orePrice').innerHTML = orePrice.toFixed(0) + '<span class="unit">元/吨</span>';
  document.getElementById('breakdown').textContent = formula + ' - TC ' + tc + ' = ' + orePrice.toFixed(0) + ' 元/吨';
}

function fetchPrices() {
  fetch('data/price.json?_=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.price && d.price > 0) {
        niPrice = d.price;
        document.getElementById('priceNi').innerHTML = d.price.toLocaleString() + '<span class="unit">元/吨</span>';
        document.getElementById('metaNi').textContent = (d.date || d.updated_at || '') + ' · ' + (d.source || 'SMM');
        document.getElementById('dotNi').className = 'dot live';
      }
      calc();
    })
    .catch(function() {
      document.getElementById('metaNi').innerHTML = '<span class="price-error">暂用默认价</span>';
      document.getElementById('dotNi').className = 'dot cache';
      calc();
    });
}

function init() {
  buildPresets();
  fetchPrices();
  calc();
  setInterval(fetchPrices, 60000);
}
init();
</script>
</body>
</html>
