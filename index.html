<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>镍矿石计价器 · 鑫善源 💚</title>

<style>

/* ===== 全局变量 - 镍矿石计价器霓虹主题 ===== */
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #1a1a25;
  --bg-card-hover: #1f1f2e;
  --border-glow: #50c87880;
  --neon-purple: #50c878;
  --neon-blue: #2e7d4f;
  --neon-cyan: #7defa0;
  --neon-green: #00ff88;
  --neon-pink: #ff0080;
  --neon-gold: #ffd700;
  --text-primary: #ffffff;
  --text-secondary: #a0a0c0;
  --text-muted: #606080;
  --success: #00ff88;
  --danger: #ff4466;
  --warning: #ffaa00;
  --radius-lg: 16px;
  --radius-md: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
  background: var(--bg-primary);
  min-height: 100vh;
  color: var(--text-primary);
  padding-bottom: 40px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: 
    radial-gradient(circle at 20% 30%, rgba(155, 0, 255, 0.06) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0, 45, 255, 0.06) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
  animation: bgFloat 20s ease-in-out infinite;
}

@keyframes bgFloat {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(2%, -2%) rotate(1deg); }
  66% { transform: translate(-2%, 2%) rotate(-1deg); }
}

.header {
  background: linear-gradient(135deg, rgba(155, 0, 255, 0.12) 0%, rgba(0, 45, 255, 0.12) 100%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(155, 0, 255, 0.25);
  color: #fff;
  padding: 20px 16px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 30px rgba(155, 0, 255, 0.15);
}

.header h1 {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan), var(--neon-blue));
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 3s ease infinite;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.header .sub {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.header .brand {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

.source-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  vertical-align: middle;
}

.source-dot.live {
  background: var(--neon-green);
  box-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green);
  animation: pulse 2s ease-in-out infinite;
}

.source-dot.delayed {
  background: var(--warning);
  box-shadow: 0 0 8px var(--warning);
}

.source-dot.offline {
  background: var(--text-muted);
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.2); }
}

.container {
  padding: 16px 12px;
  max-width: 500px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.card {
  background: var(--bg-card);
  border: 1px solid rgba(155, 0, 255, 0.15);
  border-radius: var(--radius-lg);
  padding: 18px 16px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(155, 0, 255, 0.08), transparent);
  transition: left 0.6s ease;
}

.card:hover::before { left: 100%; }

.card:hover {
  border-color: rgba(155, 0, 255, 0.4);
  box-shadow: 0 0 20px rgba(155, 0, 255, 0.15), 0 8px 32px rgba(0, 0, 0, 0.4);
  transform: translateY(-2px);
}

.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.card-title::before {
  content: '';
  width: 3px;
  height: 16px;
  background: linear-gradient(180deg, var(--neon-purple), var(--neon-cyan));
  border-radius: 2px;
}

.price-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, rgba(155, 0, 255, 0.08) 0%, rgba(0, 45, 255, 0.08) 100%);
  border: 1px solid rgba(155, 0, 255, 0.2);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}

.price-bar::after {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 150px;
  height: 150px;
  background: radial-gradient(circle, rgba(0, 240, 255, 0.12) 0%, transparent 70%);
  border-radius: 50%;
  animation: priceGlow 4s ease-in-out infinite;
}

@keyframes priceGlow {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.1); opacity: 0.8; }
}

.price-bar .price {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  z-index: 1;
}

.price-bar .change {
  font-size: 12px;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 6px;
  position: relative;
  z-index: 1;
}

.price-bar .change.up {
  color: var(--danger);
  background: rgba(255, 68, 102, 0.12);
  border: 1px solid rgba(255, 68, 102, 0.25);
}

.price-bar .change.down {
  color: var(--success);
  background: rgba(0, 255, 136, 0.12);
  border: 1px solid rgba(0, 255, 136, 0.25);
}

.price-bar .status {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 700;
  position: relative;
  z-index: 1;
}

.price-bar .status.realtime {
  background: rgba(0, 240, 255, 0.12);
  color: var(--neon-cyan);
  border: 1px solid rgba(0, 240, 255, 0.25);
}

.price-bar .status.closed {
  background: rgba(96, 96, 128, 0.15);
  color: var(--text-muted);
  border: 1px solid rgba(96, 96, 128, 0.25);
}

.price-bar .refresh {
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
  color: #fff;
  border: none;
  transition: all 0.3s ease;
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 36px;
  min-height: 36px;
}

.price-bar .refresh:hover {
  box-shadow: 0 0 20px rgba(155, 0, 255, 0.4);
  transform: scale(1.05);
}

.price-bar .refresh:active { transform: scale(0.95); }

.price-bar .refresh.loading { animation: spin 1s linear infinite; }

@keyframes spin { to { transform: rotate(360deg); } }

.quick-presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.preset-chip {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  background: rgba(96, 96, 128, 0.15);
  color: var(--text-secondary);
  border: 1.5px solid rgba(96, 96, 128, 0.25);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.preset-chip:hover {
  background: rgba(155, 0, 255, 0.12);
  border-color: rgba(155, 0, 255, 0.35);
  color: var(--text-primary);
  transform: translateY(-1px);
}

.preset-chip.active {
  background: linear-gradient(135deg, rgba(155, 0, 255, 0.25), rgba(0, 45, 255, 0.25));
  border-color: var(--neon-purple);
  color: var(--text-primary);
  box-shadow: 0 0 15px rgba(155, 0, 255, 0.25);
}

.form-row { display: flex; gap: 10px; margin-bottom: 10px; }
.form-row .field { flex: 1; }
.field { margin-bottom: 10px; }

.field label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

.field label span {
  font-weight: 400;
  color: var(--text-muted);
  font-size: 11px;
}

.field .input-wrap { position: relative; }

.field input {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-secondary);
  border: 1.5px solid rgba(96, 96, 128, 0.25);
  border-radius: var(--radius-md);
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  outline: none;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.field input:hover { border-color: rgba(155, 0, 255, 0.35); }

.field input:focus {
  border-color: var(--neon-purple);
  box-shadow: 0 0 0 3px rgba(155, 0, 255, 0.12), 0 0 20px rgba(155, 0, 255, 0.15);
  background: var(--bg-card);
}

.field .suffix {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 600;
  pointer-events: none;
}

.note {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 6px;
  padding-left: 4px;
}

.btn-group {
  display: flex;
  gap: 10px;
  margin-top: 14px;
}

.btn {
  flex: 1;
  padding: 14px 0;
  border: none;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  text-align: center;
  position: relative;
  overflow: hidden;
  letter-spacing: 1px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
  color: #fff;
  border: 2px solid var(--neon-purple);
}

.btn-primary::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  display: block;
  border-radius: 50px;
  background: rgba(255, 255, 255, 0.12);
  width: 50px;
  height: 50px;
  transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.btn-primary:hover::before {
  width: 100%;
  background: rgba(255, 255, 255, 0.08);
}

.btn-primary:hover {
  box-shadow: 0 0 30px rgba(155, 0, 255, 0.4), 0 0 60px rgba(0, 45, 255, 0.25);
  transform: translateY(-2px);
}

.btn-primary:active { transform: scale(0.97); }

.btn-success {
  background: transparent;
  color: var(--neon-cyan);
  border: 2px solid var(--neon-cyan);
}

.btn-success::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  display: block;
  border-radius: 50px;
  background: rgba(0, 240, 255, 0.08);
  width: 50px;
  height: 50px;
  transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.btn-success:hover::before {
  width: 100%;
  background: rgba(0, 240, 255, 0.12);
}

.btn-success:hover {
  box-shadow: 0 0 30px rgba(0, 240, 255, 0.35), inset 0 0 20px rgba(0, 240, 255, 0.08);
  transform: translateY(-2px);
}

.btn-success:active { transform: scale(0.97); }

.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.tag-6 { background: rgba(0, 240, 255, 0.12); color: var(--neon-cyan); border: 1px solid rgba(0, 240, 255, 0.25); }
.tag-5 { background: rgba(0, 255, 136, 0.12); color: var(--neon-green); border: 1px solid rgba(0, 255, 136, 0.25); }
.tag-4 { background: rgba(255, 170, 0, 0.12); color: var(--warning); border: 1px solid rgba(255, 170, 0, 0.25); }
.tag-3 { background: rgba(255, 0, 128, 0.12); color: #ff0080; border: 1px solid rgba(255, 0, 128, 0.25); }
.tag-2 { background: rgba(255, 215, 0, 0.12); color: #ffd700; border: 1px solid rgba(255, 215, 0, 0.25); }
.tag-1 { background: rgba(255, 68, 102, 0.12); color: var(--danger); border: 1px solid rgba(255, 68, 102, 0.25); }

.result-card {
  background: var(--bg-card);
  border: 1px solid rgba(0, 240, 255, 0.15);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 14px;
  display: none;
  position: relative;
}

.result-card.show {
  display: block;
  animation: fadeInUp 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-header {
  background: linear-gradient(135deg, rgba(155, 0, 255, 0.15) 0%, rgba(0, 45, 255, 0.15) 100%);
  color: var(--text-primary);
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(155, 0, 255, 0.15);
  letter-spacing: 1px;
}

.result-body { padding: 12px 16px; }

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(96, 96, 128, 0.12);
  font-size: 13px;
}

.result-row:last-child { border-bottom: none; }

.result-label { color: var(--text-secondary); font-weight: 500; }
.result-val { font-weight: 800; color: var(--text-primary); }

.result-val.big {
  font-size: 22px;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.result-val.dun {
  color: var(--neon-green);
  text-shadow: 0 0 10px rgba(0, 255, 136, 0.25);
}

.result-val.usd {
  color: #ffd700;
  text-shadow: 0 0 10px rgba(255, 215, 0, 0.25);
}

.copy-btn {
  background: rgba(96, 96, 128, 0.15);
  border: 1px solid rgba(96, 96, 128, 0.25);
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 11px;
  color: var(--text-secondary);
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s ease;
}

.copy-btn:hover {
  background: rgba(155, 0, 255, 0.15);
  border-color: var(--neon-purple);
  color: var(--text-primary);
}

.copy-btn:active { transform: scale(0.95); }

.error-box {
  background: rgba(255, 68, 102, 0.08);
  border: 1px solid rgba(255, 68, 102, 0.25);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  margin-bottom: 14px;
  font-size: 13px;
  color: var(--danger);
  display: none;
  animation: shake 0.5s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.history-card {
  background: var(--bg-card);
  border: 1px solid rgba(96, 96, 128, 0.15);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  margin-bottom: 14px;
  display: none;
}

.history-card.show {
  display: block;
  animation: fadeInUp 0.5s ease;
}

.history-card h3 {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.history-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(96, 96, 128, 0.12);
  font-size: 12px;
}

.history-item .h-price { font-weight: 800; color: var(--neon-cyan); }
.history-item .h-time { color: var(--text-muted); font-size: 11px; }
.history-item:last-child { border-bottom: none; }

.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
  color: #fff;
  padding: 10px 24px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  z-index: 999;
  pointer-events: none;
  box-shadow: 0 4px 20px rgba(155, 0, 255, 0.35);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.footer {
  text-align: center;
  padding: 16px;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
}

@media (min-width: 480px) {
  .container { padding: 20px 16px; }
}

</style>

</head>

<body>

<div class="container">

  <!-- Header -->

  <div class="header">

    <h1>💚 镍矿石计价器</h1>

    <div class="subtitle">基于SMM 1#电解镍现货行情</div>

  </div>



  <!-- Price Card -->

  <div class="price-card">

    <div class="price-label">

      <span class="dot" id="statusDot"></span>

      SMM 1#电解镍（现货）

    </div>

    <div class="price-value" id="priceDisplay">--<span class="unit">元/吨</span></div>

    <div class="price-meta">

      <span id="priceTime">加载中...</span>

      <button class="refresh-btn" onclick="fetchPrices(true)">🔄 刷新</button>

    </div>

    <div class="manual-price" id="manualPriceRow" style="display:none">

      <span>手动输入:</span>

      <input type="number" id="manualPriceInput" placeholder="价格 (元/吨)">

      <button onclick="setManualPrice()">确定</button>

    </div>

    <span style="font-size:0.65rem;color:var(--text2);cursor:pointer;margin-top:4px;display:inline-block"

      id="manualToggle"

      onclick="document.getElementById('manualPriceRow').style.display='flex';this.style.display='none'">

      或手动输入价格

    </span>

  </div>



  <!-- Ore Type -->

  <div class="ore-type">

    <button class="active" onclick="setOreType('laterite')">红土镍矿</button>

    <button onclick="setOreType('sulfide')">硫化镍矿</button>

  </div>



  <!-- Calculator Card -->

  <div class="calc-card">

    <h2><span class="icon">📐</span> 矿石计价计算</h2>



    <div class="grade-section">

      <div class="grade-label">

        <span class="name">镍品位 Ni%</span>

        <span class="value" id="gradeValue">1.80<span class="pct">%</span></span>

      </div>

      <div class="slider-wrap">

        <input type="range" id="niGrade" min="0.5" max="3.0" step="0.05" value="1.80" oninput="calc()">

      </div>

      <div class="grade-ticks"><span>0.5%</span><span>1.0%</span><span>1.5%</span><span>2.0%</span><span>2.5%</span><span>3.0%</span></div>

      <div class="grade-presets" id="gradePresets"></div>

    </div>



    <div class="param-row">

      <div class="param-item">

        <div class="lbl">计价系数</div>

        <div class="v" id="coeff">88.0%</div>

      </div>

      <div class="param-item">

        <div class="lbl">冶炼加工费 TC (元/吨)</div>

        <input type="number" id="tc" value="800" min="0" max="5000" step="50" oninput="calc()">

      </div>

    </div>



    <div class="param-row">

      <div class="param-item">

        <div class="lbl">汇率 (USD&#x2192;CNY) <span style="color:#4caf50;font-size:0.6rem" id="fxStatus">实时</span></div>

        <input type="number" id="exchangeRate" value="7.25" min="6.5" max="8.0" step="0.01" onchange="onFxManual()" onfocus="onFxManual()" oninput="calc()">

        <div style="font-size:0.6rem;color:var(--text2);margin-top:2px" id="fxSource"></div>

      </div>

      <div class="param-item">

        <div class="lbl">水分 H₂O%</div>

        <input type="number" id="moisture" value="35" min="20" max="45" step="1" oninput="calc()">

      </div>

    </div>



    <div class="tax-toggle">

      <span class="lbl" id="taxLabel">含税模式 (÷1.13)</span>

      <label class="toggle-sw">

        <input type="checkbox" id="taxMode" checked onchange="calc()">

        <span class="slider"></span>

      </label>

    </div>



    <!-- Coeff Table Toggle -->

    <button class="toggle-table-btn" onclick="toggleTable()">📊 查看系数参考表</button>

    <div class="coeff-table-wrap" id="coeffTableWrap">

      <table class="coeff-table" id="coeffTable"></table>

    </div>

  </div>



  <!-- Result Card -->

  <div class="result-card">

    <div class="label">💰 镍矿石单价</div>

    <div class="price" id="orePrice">0<span class="unit">元/吨</span></div>

    <div class="result-formula" id="breakdown"></div>

  </div>



<!-- Footer -->

<div class="footer">

  <span class="brand">矿链通1.0</span>

  <span class="brand"> -佛山鑫善源</span>

</div>



<script>

var LATERITE_COEFF = [

  [0.5,75],[0.8,78],[1.0,80],[1.2,82],[1.4,84],

  [1.5,85],[1.6,86],[1.7,87],[1.8,88],[2.0,89],

  [2.2,90],[2.5,91],[3.0,92]

];

var SULFIDE_COEFF = [

  [0.5,80],[0.8,83],[1.0,85],[1.2,87],[1.4,88],

  [1.5,89],[1.6,90],[1.7,90],[1.8,91],[2.0,92],

  [2.2,93],[2.5,94],[3.0,95]

];



var currentOreType = 'laterite';

var niPrice = 127250;

var manualOverride = false;



function getCoeff(table, grade) {

  if (grade <= table[0][0]) return table[0][1];

  if (grade >= table[table.length-1][0]) return table[table.length-1][1];

  for (var i = 0; i < table.length - 1; i++) {

    if (grade >= table[i][0] && grade <= table[i+1][0]) {

      var t = (grade - table[i][0]) / (table[i+1][0] - table[i][0]);

      return table[i][1] + t * (table[i+1][1] - table[i][1]);

    }

  }

  return table[table.length-1][1];

}



var fxManual = false;

var currentFxRate = 7.25;



function fetchFxRate() {

  var API_LIST = [

    'https://api.frankfurter.app/latest?from=USD&to=CNY',

    'https://api.exchangerate-api.com/v4/latest/USD',

    'https://open.er-api.com/v6/latest/USD'

  ];

  function tryApi(idx) {

    if (idx >= API_LIST.length) {

      document.getElementById('fxStatus').textContent = '离线';

      document.getElementById('fxStatus').style.color = '#e05555';

      document.getElementById('fxSource').textContent = 'API不可用，使用手动汇率';

      return;

    }

    fetch(API_LIST[idx], { signal: AbortSignal.timeout(8000) })

      .then(function(r) { return r.json(); })

      .then(function(data) {

        var rate, dateStr = '';

        if (data.rates && data.rates.CNY) {

          rate = data.rates.CNY;

          dateStr = data.date || '';

        }

        if (rate && rate > 0) {

          currentFxRate = parseFloat(rate.toFixed(4));

          if (!fxManual) {

            document.getElementById('exchangeRate').value = currentFxRate;

          }

          document.getElementById('fxStatus').textContent = '实时';

          document.getElementById('fxStatus').style.color = '#4caf50';

          document.getElementById('fxSource').textContent = '来源: ' + API_LIST[idx].split('/')[2] + (dateStr ? ' (' + dateStr + ')' : '');

          if (!fxManual) calc();

        } else {

          tryApi(idx + 1);

        }

      })

      .catch(function() { tryApi(idx + 1); });

  }

  tryApi(0);

}



function onFxManual() {

  fxManual = true;

  document.getElementById('fxStatus').textContent = '手动';

  document.getElementById('fxStatus').style.color = '#daa520';

  document.getElementById('fxSource').textContent = '手动输入汇率';

}



function getCoeffTable() {

  return currentOreType === 'laterite' ? LATERITE_COEFF : SULFIDE_COEFF;

}



function setOreType(type) {

  currentOreType = type;

  document.querySelectorAll('.ore-type button').forEach(function(b, i) {

    b.classList.toggle('active', (i === 0 && type === 'laterite') || (i === 1 && type === 'sulfide'));

  });

  buildPresets();

  buildCoeffTable();

  calc();

}



function buildPresets() {

  var el = document.getElementById('gradePresets');

  el.innerHTML = '';

  var grades = currentOreType === 'laterite'

    ? [0.8, 1.0, 1.2, 1.4, 1.5, 1.6, 1.8, 2.0, 2.5]

    : [0.8, 1.0, 1.2, 1.5, 1.8, 2.0, 2.5, 3.0];

  grades.forEach(function(g) {

    var b = document.createElement('button');

    b.textContent = g.toFixed(1) + '%';

    b.onclick = function() { document.getElementById('niGrade').value = g; calc(); };

    el.appendChild(b);

  });

}



function calc() {

  var grade = parseFloat(document.getElementById('niGrade').value);

  var tc = parseFloat(document.getElementById('tc').value) || 800;

  var exchangeRate = parseFloat(document.getElementById('exchangeRate').value) || 7.25;

  var moisture = parseFloat(document.getElementById('moisture').value) || 35;

  var exVat = document.getElementById('taxMode').checked;

  var divider = exVat ? 1.13 : 1;

  var coeffTable = getCoeffTable();

  var coeff = getCoeff(coeffTable, grade);



  document.getElementById('gradeValue').innerHTML = grade.toFixed(2) + '<span class="pct">%</span>';

  document.getElementById('coeff').textContent = coeff.toFixed(1) + '%';

  document.getElementById('taxLabel').innerHTML = exVat ? '含税模式 (&divide;1.13)' : '不含税模式 (直接计算)';



  var metalValue, formula;

  var priceStr = niPrice.toLocaleString();

  var vatStr = exVat ? ' &divide;1.13' : '';



  if (currentOreType === 'laterite') {

    metalValue = (niPrice / divider) * (grade / 100) * (coeff / 100) * (1 - moisture / 100);

    formula = 'SMM ' + priceStr + vatStr + ' &times; ' + grade.toFixed(2) + '% &times; ' + coeff.toFixed(1) + '% &times; (1-' + moisture + '%水分)';

  } else {

    metalValue = (niPrice / divider) * (grade / 100) * (coeff / 100);

    formula = 'SMM ' + priceStr + vatStr + ' &times; ' + grade.toFixed(2) + '% &times; ' + coeff.toFixed(1) + '%';

  }



  var orePrice = metalValue - tc;

  if (orePrice < 0) orePrice = 0;



  document.getElementById('orePrice').innerHTML = orePrice.toFixed(0) + '<span class="unit">元/吨</span>';

  document.getElementById('breakdown').textContent = formula + ' - TC ' + tc + ' = ' + orePrice.toFixed(0) + ' 元/吨';



  highlightTableRow(grade);

  updatePresetButtons(grade);

}



function highlightTableRow(grade) {

  var rows = document.querySelectorAll('#coeffTable tr');

  rows.forEach(function(r) { r.classList.remove('current'); });

  var rounded = Math.round(grade * 10) / 10;

  rows.forEach(function(r) {

    var cells = r.querySelectorAll('td');

    for (var i = 0; i < cells.length; i += 2) {

      if (cells[i] && cells[i].textContent && parseFloat(cells[i].textContent) === rounded) {

        r.classList.add('current');

      }

    }

  });

}



function updatePresetButtons(grade) {

  var buttons = document.querySelectorAll('#gradePresets button');

  buttons.forEach(function(btn) {

    var g = parseFloat(btn.textContent);

    if (Math.abs(g - grade) < 0.03) {

      btn.classList.add('active');

    } else {

      btn.classList.remove('active');

    }

  });

}



// ===== Price Fetch =====

function fetchPrices(force) {

  if (force) {

    document.getElementById('priceDisplay').innerHTML = '<span class="spinner"></span>';

    document.getElementById('priceTime').textContent = '正在获取最新价格...';

  }



  fetch('data/price.json?_=' + Date.now())

    .then(function(r) { return r.json(); })

    .then(function(d) {

      if (!manualOverride && d.price && d.price > 0) {

        niPrice = d.price;

      }

      document.getElementById('priceDisplay').innerHTML = niPrice.toLocaleString() + '<span class="unit">元/吨</span>';

      var metaText = (d.date || d.updated_at || '') + ' · ' + (d.source || 'SMM');

      if (d.smm_high && d.smm_low) {

        metaText += ' | ' + d.smm_low + '~' + d.smm_high;

      }

      if (!manualOverride) {

        document.getElementById('priceTime').textContent = metaText;

        var dot = document.getElementById('statusDot');

        if (dot) dot.style.background = '#4caf50';

      }

      calc();

    })

    .catch(function() {

      document.getElementById('priceDisplay').innerHTML = niPrice.toLocaleString() + '<span class="unit">元/吨</span>';

      if (!manualOverride) {

        document.getElementById('priceTime').innerHTML = '<span class="price-error">离线 · SMM参考价</span>';

        var dot = document.getElementById('statusDot');

        if (dot) dot.style.background = '#e05555';

      }

      calc();

    });

}



function setManualPrice() {

  var val = parseFloat(document.getElementById('manualPriceInput').value);

  if (val > 0) {

    niPrice = val;

    manualOverride = true;

    document.getElementById('priceDisplay').innerHTML = val.toLocaleString() + '<span class="unit">元/吨</span>';

    document.getElementById('priceTime').textContent = '手动输入价格';

    var dot = document.getElementById('statusDot');

    if (dot) dot.style.background = '#daa520';

    calc();

  }

}



// ===== Coeff Table =====

function buildCoeffTable() {

  var table = document.getElementById('coeffTable');

  var coeffTable = getCoeffTable();

  var label = currentOreType === 'laterite' ? '红土镍矿' : '硫化镍矿';

  var html = '<tr><th>Ni% (' + label + ')</th><th>系数</th><th>Ni% (' + label + ')</th><th>系数</th></tr>';

  var half = Math.ceil(coeffTable.length / 2);

  for (var i = 0; i < half; i++) {

    var left = coeffTable[i];

    var right = coeffTable[i + half];

    html += '<tr><td>' + left[0] + '%</td><td>' + left[1] + '%</td>';

    if (right) {

      html += '<td>' + right[0] + '%</td><td>' + right[1] + '%</td>';

    } else {

      html += '<td></td><td></td>';

    }

    html += '</tr>';

  }

  table.innerHTML = html;

}



function toggleTable() {

  var wrap = document.getElementById('coeffTableWrap');

  wrap.classList.toggle('open');

}



// ===== Init =====

function init() {

  buildPresets();

  buildCoeffTable();

  fetchPrices();

  fetchFxRate();

  calc();

  setInterval(fetchPrices, 60000);

  setInterval(fetchFxRate, 600000);

}



init();

</script>

</body>

</html>
