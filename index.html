<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>镍矿石计价器 · 鑫善源 🟢</title>

<style>
:root {
  --bg: #0a0a0f;
  --card: #1a1a25;
  --card2: #22222e;
  --text: #ffffff;
  --text2: #a0a0c0;
  --primary: #4caf50;
  --primary-light: #8bc34a;
  --primary-dark: #2e7d32;
  --gold: #8bc34a;
  --accent: #00e676;
  --danger: #ff4466;
  --border: #2a2a3a;
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 16px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: 
    radial-gradient(circle at 20% 30%, rgba(155, 0, 255, 0.05) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0, 45, 255, 0.05) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
  animation: bgFloat 20s ease-in-out infinite;
}

@keyframes bgFloat {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(1%, -1%); }
}

.container { width:100%; max-width:520px; position: relative; z-index: 1; }

.header {
  text-align: center;
  padding: 24px 0 20px;
}

.header h1 {
  font-size: 2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--primary-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
}

.header .subtitle {
  font-size: 0.8rem;
  color: var(--text2);
  margin-top: 6px;
  letter-spacing: 1px;
}

.header .source-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  vertical-align: middle;
  margin-right: 4px;
}

.header .source-dot.live {
  background: #00ff88;
  box-shadow: 0 0 10px #00ff88;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.4; }
}

.price-card {
  background: linear-gradient(135deg, rgba(255,107,53,0.08), rgba(199,62,29,0.06));
  border: 1px solid var(--primary-dark);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.price-card::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -30%;
  width: 140px;
  height: 140px;
  background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
  opacity: 0.12;
  border-radius: 50%;
  animation: priceGlow 4s ease-in-out infinite;
}

@keyframes priceGlow {
  0%, 100% { transform: scale(1); opacity: 0.08; }
  50% { transform: scale(1.1); opacity: 0.15; }
}

.price-label {
  font-size: 0.75rem;
  color: var(--primary-light);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.price-label .dot {
  width: 8px; height: 8px;
  background: #00ff88;
  border-radius: 50%;
  animation: pulse 2s infinite;
  box-shadow: 0 0 8px #00ff88;
}

.price-value {
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--primary-light);
  line-height: 1;
  background: linear-gradient(135deg, var(--primary-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.price-value .unit {
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--text2);
  margin-left: 4px;
  -webkit-text-fill-color: var(--text2);
}

.price-meta {
  font-size: 0.7rem;
  color: var(--text2);
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.refresh-btn {
  background: rgba(255,107,53,0.15);
  border: 1px solid var(--primary-dark);
  color: var(--primary-light);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: 600;
}

.refresh-btn:hover {
  background: rgba(255,107,53,0.25);
  box-shadow: 0 0 15px rgba(255,107,53,0.3);
}

.refresh-btn:active { transform: scale(0.95); }

.manual-price {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  font-size: 0.75rem;
}

.manual-price input {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 8px;
  width: 120px;
  font-size: 0.8rem;
  text-align: center;
}

.manual-price input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
}

.manual-price button {
  background: var(--primary-dark);
  border: none;
  color: #fff;
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 0.7rem;
  cursor: pointer;
  font-weight: 600;
}

.manual-price .toggle {
  font-size: 0.65rem;
  color: var(--primary-light);
  cursor: pointer;
  text-decoration: underline;
}

.calc-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  transition: all 0.3s;
}

.calc-card:hover {
  border-color: var(--primary-dark);
  box-shadow: 0 0 20px rgba(255,107,53,0.1);
}

.calc-card h2 {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.calc-card h2::before {
  content: '';
  width: 3px;
  height: 16px;
  background: linear-gradient(180deg, var(--primary), var(--primary-light));
  border-radius: 2px;
}

.calc-card h2 .icon { font-size: 1.2rem; }

.grade-section { margin-bottom: 20px; }

.grade-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}

.grade-label .name { font-size: 0.8rem; color: var(--text2); letter-spacing: 0.5px; }

.grade-label .value {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--primary-light);
  background: linear-gradient(135deg, var(--primary-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.grade-label .value .pct {
  font-size: 1rem;
  color: var(--text2);
  -webkit-text-fill-color: var(--text2);
}

.slider-wrap {
  position: relative;
  padding: 8px 0;
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 10px;
  border-radius: 5px;
  background: linear-gradient(90deg, var(--primary-dark), var(--primary), var(--gold));
  outline: none;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--primary-light);
  border: 3px solid #fff;
  cursor: pointer;
  box-shadow: 0 2px 12px var(--primary);
  transition: all 0.2s;
}

input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.1);
  box-shadow: 0 4px 20px var(--primary);
}

.grade-ticks {
  display: flex;
  justify-content: space-between;
  font-size: 0.65rem;
  color: var(--text2);
  padding: 4px 8px 0;
}

.grade-presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.grade-presets button {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 600;
}

.grade-presets button:hover {
  border-color: var(--primary);
  color: var(--primary-light);
  background: rgba(255,107,53,0.1);
}

.grade-presets button.active {
  background: rgba(255,107,53,0.2);
  border-color: var(--primary);
  color: var(--primary-light);
  box-shadow: 0 0 10px rgba(255,107,53,0.2);
}

.coeff-display {
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid var(--border);
}

.coeff-display .label { font-size: 0.8rem; color: var(--text2); letter-spacing: 0.5px; }

.coeff-display .value {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--accent);
  text-shadow: 0 0 10px rgba(0,240,255,0.2);
}

.result-card {
  background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(199,62,29,0.08));
  border: 2px solid var(--primary-dark);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}

.result-card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
  opacity: 0.08;
  border-radius: 50%;
}

.result-card .label {
  font-size: 0.8rem;
  color: var(--primary-light);
  margin-bottom: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.result-card .value {
  font-size: 2.8rem;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 20px rgba(255,215,0,0.3);
  position: relative;
  z-index: 1;
}

.result-card .unit {
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--text2);
}

.result-formula {
  font-size: 0.7rem;
  color: var(--text2);
  margin-top: 12px;
  line-height: 1.6;
}

.coeff-table-wrap {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s ease;
}

.coeff-table-wrap.open { max-height: 600px; }

.coeff-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.75rem;
  margin-top: 12px;
}

.coeff-table th, .coeff-table td {
  padding: 10px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.coeff-table th {
  color: var(--text2);
  font-weight: 600;
  font-size: 0.7rem;
  background: var(--card2);
}

.coeff-table tr:hover td { background: rgba(255,107,53,0.08); }

.coeff-table tr.current td {
  background: rgba(255,107,53,0.18);
  color: var(--primary-light);
  font-weight: 700;
}

.toggle-table-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--border);
  color: var(--text2);
  padding: 10px;
  border-radius: 10px;
  font-size: 0.7rem;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.2s;
}

.toggle-table-btn:hover {
  border-color: var(--primary);
  color: var(--primary-light);
  background: rgba(255,107,53,0.05);
}

.multi-ores { margin-top: 20px; }

.multi-ores h3 {
  font-size: 0.85rem;
  color: var(--text2);
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}

.ore-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
  padding: 12px;
  background: var(--card2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  transition: all 0.2s;
}

.ore-row:hover {
  border-color: var(--primary-dark);
}

.ore-row .ore-grade {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
}

.ore-row input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px;
  border-radius: 8px;
  width: 80px;
  font-size: 0.85rem;
  text-align: center;
  font-weight: 600;
}

.ore-row input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
}

.ore-row .ore-result {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--primary-light);
  min-width: 100px;
  text-align: right;
}

.ore-row .ore-del {
  background: none;
  border: none;
  color: var(--danger);
  cursor: pointer;
  font-size: 1.4rem;
  padding: 0 4px;
  line-height: 1;
}

.add-ore-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--border);
  color: var(--text2);
  padding: 10px;
  border-radius: 10px;
  font-size: 0.7rem;
  cursor: pointer;
  margin-bottom: 10px;
  transition: all 0.2s;
}

.add-ore-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,240,255,0.05);
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  background: rgba(255,107,53,0.12);
  border-radius: var(--radius-sm);
  border: 1px solid var(--primary-dark);
}

.total-row .label { font-size: 0.85rem; color: var(--primary-light); font-weight: 600; }

.total-row .value {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--gold);
  text-shadow: 0 0 10px rgba(255,215,0,0.2);
}

.footer {
  text-align: center;
  padding: 20px 16px;
  font-size: 0.7rem;
  color: var(--text2);
  letter-spacing: 1px;
}

.footer span {
  font-weight: 900;
  color: var(--primary);
  font-size: 1.1rem;
}

.price-error {
  color: var(--danger);
  font-size: 0.7rem;
}

/* 镍矿石特有样式 */
.ore-type {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.ore-type button {
  flex: 1;
  padding: 12px 8px;
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: var(--radius-sm);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: 600;
}

.ore-type button:hover {
  border-color: var(--primary);
  color: var(--primary-light);
}

.ore-type button.active {
  background: rgba(76,175,80,0.15);
  border-color: var(--primary);
  color: var(--primary-light);
  font-weight: 700;
  box-shadow: 0 0 15px rgba(76,175,80,0.2);
}

.param-row {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}

.param-item {
  flex: 1;
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
  border: 1px solid var(--border);
}

.param-item .lbl {
  font-size: 0.68rem;
  color: var(--text2);
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}

.param-item .v {
  font-size: 1.15rem;
  font-weight: 800;
  color: var(--accent);
  text-shadow: 0 0 8px rgba(0,230,118,0.2);
}

.param-item input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 8px;
  border-radius: 8px;
  width: 90px;
  font-size: 0.8rem;
  text-align: center;
  font-weight: 600;
}

.param-item input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(76,175,80,0.15);
}

.tax-toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding: 12px 16px;
  background: var(--card2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

.tax-toggle .lbl {
  font-size: 0.75rem;
  color: var(--text2);
  letter-spacing: 0.3px;
}

.toggle-sw {
  position: relative;
  width: 48px;
  height: 26px;
}

.toggle-sw input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-sw .slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--border);
  border-radius: 26px;
  transition: 0.3s;
}

.toggle-sw .slider:before {
  content: "";
  position: absolute;
  height: 20px;
  width: 20px;
  left: 3px;
  bottom: 3px;
  background: #fff;
  border-radius: 50%;
  transition: 0.3s;
}

.toggle-sw input:checked + .slider {
  background: var(--primary);
  box-shadow: 0 0 10px rgba(76,175,80,0.3);
}

.toggle-sw input:checked + .slider:before {
  transform: translateX(22px);
}

.toggle-manual {
  font-size: 0.65rem;
  color: var(--text2);
  cursor: pointer;
  margin-top: 4px;
  display: inline-block;
}

</style>

</head>

<body>

<div class="container">

  <!-- Header -->

  <div class="header">

    <h1>镍矿石计价计算器</h1>

    <div class="subtitle">基于SMM 1#电解镍现货行情</div>

  </div>



  <!-- Price Card -->

  <div class="price-card">

    <div class="price-label">

      <span class="dot" id="statusDot"></span>

      SMM 1#电解镍（现货）

    </div>

    <div class="price-value" id="priceDisplay">--<span class="unit">元/吨</span></div>

    <div class="price-meta">

      <span id="priceTime">加载中...</span>

      <button class="refresh-btn" onclick="fetchPrices(true)">🔄 刷新</button>

    </div>

    <div class="manual-price" id="manualPriceRow" style="display:none">

      <span>手动输入:</span>

      <input type="number" id="manualPriceInput" placeholder="价格 (元/吨)">

      <button onclick="setManualPrice()">确定</button>

    </div>

    <span style="font-size:0.65rem;color:var(--text2);cursor:pointer;margin-top:4px;display:inline-block"

      id="manualToggle"

      onclick="document.getElementById('manualPriceRow').style.display='flex';this.style.display='none'">

      或手动输入价格

    </span>

  </div>



  <!-- Ore Type -->

  <div class="ore-type">

    <button class="active" onclick="setOreType('laterite')">红土镍矿</button>

    <button onclick="setOreType('sulfide')">硫化镍矿</button>

  </div>



  <!-- Calculator Card -->

  <div class="calc-card">

    <h2><span class="icon">📐</span> 矿石计价计算</h2>



    <div class="grade-section">

      <div class="grade-label">

        <span class="name">镍品位 Ni%</span>

        <span class="value" id="gradeValue">1.80<span class="pct">%</span></span>

      </div>

      <div class="slider-wrap">

        <input type="range" id="niGrade" min="0.5" max="3.0" step="0.05" value="1.80" oninput="calc()">

      </div>

      <div class="grade-ticks"><span>0.5%</span><span>1.0%</span><span>1.5%</span><span>2.0%</span><span>2.5%</span><span>3.0%</span></div>

      <div class="grade-presets" id="gradePresets"></div>

    </div>



    <div class="param-row">

      <div class="param-item">

        <div class="lbl">计价系数</div>

        <div class="v" id="coeff">88.0%</div>

      </div>

      <div class="param-item">

        <div class="lbl">冶炼加工费 TC (元/吨)</div>

        <input type="number" id="tc" value="800" min="0" max="5000" step="50" oninput="calc()">

      </div>

    </div>



    <div class="param-row">

      <div class="param-item">

        <div class="lbl">汇率 (USD&#x2192;CNY) <span style="color:#4caf50;font-size:0.6rem" id="fxStatus">实时</span></div>

        <input type="number" id="exchangeRate" value="7.25" min="6.5" max="8.0" step="0.01" onchange="onFxManual()" onfocus="onFxManual()" oninput="calc()">

        <div style="font-size:0.6rem;color:var(--text2);margin-top:2px" id="fxSource"></div>

      </div>

      <div class="param-item">

        <div class="lbl">水分 H₂O%</div>

        <input type="number" id="moisture" value="35" min="20" max="45" step="1" oninput="calc()">

      </div>

    </div>



    <div class="tax-toggle">

      <span class="lbl" id="taxLabel">含税模式 (÷1.13)</span>

      <label class="toggle-sw">

        <input type="checkbox" id="taxMode" checked onchange="calc()">

        <span class="slider"></span>

      </label>

    </div>



    <!-- Coeff Table Toggle -->

    <button class="toggle-table-btn" onclick="toggleTable()">📊 查看系数参考表</button>

    <div class="coeff-table-wrap" id="coeffTableWrap">

      <table class="coeff-table" id="coeffTable"></table>

    </div>

  </div>



  <!-- Result Card -->

  <div class="result-card">

    <div class="label">💰 镍矿石单价</div>

    <div class="price" id="orePrice">0<span class="unit">元/吨</span></div>

    <div class="result-formula" id="breakdown"></div>

  </div>



<!-- Footer -->

<div class="footer">

  <span class="brand">矿链通1.0</span>

  <span class="brand"> -佛山鑫善源</span>

</div>



<script>

var LATERITE_COEFF = [

  [0.5,75],[0.8,78],[1.0,80],[1.2,82],[1.4,84],

  [1.5,85],[1.6,86],[1.7,87],[1.8,88],[2.0,89],

  [2.2,90],[2.5,91],[3.0,92]

];

var SULFIDE_COEFF = [

  [0.5,80],[0.8,83],[1.0,85],[1.2,87],[1.4,88],

  [1.5,89],[1.6,90],[1.7,90],[1.8,91],[2.0,92],

  [2.2,93],[2.5,94],[3.0,95]

];



var currentOreType = 'laterite';

var niPrice = 127250;

var manualOverride = false;



function getCoeff(table, grade) {

  if (grade <= table[0][0]) return table[0][1];

  if (grade >= table[table.length-1][0]) return table[table.length-1][1];

  for (var i = 0; i < table.length - 1; i++) {

    if (grade >= table[i][0] && grade <= table[i+1][0]) {

      var t = (grade - table[i][0]) / (table[i+1][0] - table[i][0]);

      return table[i][1] + t * (table[i+1][1] - table[i][1]);

    }

  }

  return table[table.length-1][1];

}



var fxManual = false;

var currentFxRate = 7.25;



function fetchFxRate() {

  var API_LIST = [

    'https://api.frankfurter.app/latest?from=USD&to=CNY',

    'https://api.exchangerate-api.com/v4/latest/USD',

    'https://open.er-api.com/v6/latest/USD'

  ];

  function tryApi(idx) {

    if (idx >= API_LIST.length) {

      document.getElementById('fxStatus').textContent = '离线';

      document.getElementById('fxStatus').style.color = '#e05555';

      document.getElementById('fxSource').textContent = 'API不可用，使用手动汇率';

      return;

    }

    fetch(API_LIST[idx], { signal: AbortSignal.timeout(8000) })

      .then(function(r) { return r.json(); })

      .then(function(data) {

        var rate, dateStr = '';

        if (data.rates && data.rates.CNY) {

          rate = data.rates.CNY;

          dateStr = data.date || '';

        }

        if (rate && rate > 0) {

          currentFxRate = parseFloat(rate.toFixed(4));

          if (!fxManual) {

            document.getElementById('exchangeRate').value = currentFxRate;

          }

          document.getElementById('fxStatus').textContent = '实时';

          document.getElementById('fxStatus').style.color = '#4caf50';

          document.getElementById('fxSource').textContent = '来源: ' + API_LIST[idx].split('/')[2] + (dateStr ? ' (' + dateStr + ')' : '');

          if (!fxManual) calc();

        } else {

          tryApi(idx + 1);

        }

      })

      .catch(function() { tryApi(idx + 1); });

  }

  tryApi(0);

}



function onFxManual() {

  fxManual = true;

  document.getElementById('fxStatus').textContent = '手动';

  document.getElementById('fxStatus').style.color = '#daa520';

  document.getElementById('fxSource').textContent = '手动输入汇率';

}



function getCoeffTable() {

  return currentOreType === 'laterite' ? LATERITE_COEFF : SULFIDE_COEFF;

}



function setOreType(type) {

  currentOreType = type;

  document.querySelectorAll('.ore-type button').forEach(function(b, i) {

    b.classList.toggle('active', (i === 0 && type === 'laterite') || (i === 1 && type === 'sulfide'));

  });

  buildPresets();

  buildCoeffTable();

  calc();

}



function buildPresets() {

  var el = document.getElementById('gradePresets');

  el.innerHTML = '';

  var grades = currentOreType === 'laterite'

    ? [0.8, 1.0, 1.2, 1.4, 1.5, 1.6, 1.8, 2.0, 2.5]

    : [0.8, 1.0, 1.2, 1.5, 1.8, 2.0, 2.5, 3.0];

  grades.forEach(function(g) {

    var b = document.createElement('button');

    b.textContent = g.toFixed(1) + '%';

    b.onclick = function() { document.getElementById('niGrade').value = g; calc(); };

    el.appendChild(b);

  });

}



function calc() {

  var grade = parseFloat(document.getElementById('niGrade').value);

  var tc = parseFloat(document.getElementById('tc').value) || 800;

  var exchangeRate = parseFloat(document.getElementById('exchangeRate').value) || 7.25;

  var moisture = parseFloat(document.getElementById('moisture').value) || 35;

  var exVat = document.getElementById('taxMode').checked;

  var divider = exVat ? 1.13 : 1;

  var coeffTable = getCoeffTable();

  var coeff = getCoeff(coeffTable, grade);



  document.getElementById('gradeValue').innerHTML = grade.toFixed(2) + '<span class="pct">%</span>';

  document.getElementById('coeff').textContent = coeff.toFixed(1) + '%';

  document.getElementById('taxLabel').innerHTML = exVat ? '含税模式 (&divide;1.13)' : '不含税模式 (直接计算)';



  var metalValue, formula;

  var priceStr = niPrice.toLocaleString();

  var vatStr = exVat ? ' &divide;1.13' : '';



  if (currentOreType === 'laterite') {

    metalValue = (niPrice / divider) * (grade / 100) * (coeff / 100) * (1 - moisture / 100);

    formula = 'SMM ' + priceStr + vatStr + ' &times; ' + grade.toFixed(2) + '% &times; ' + coeff.toFixed(1) + '% &times; (1-' + moisture + '%水分)';

  } else {

    metalValue = (niPrice / divider) * (grade / 100) * (coeff / 100);

    formula = 'SMM ' + priceStr + vatStr + ' &times; ' + grade.toFixed(2) + '% &times; ' + coeff.toFixed(1) + '%';

  }



  var orePrice = metalValue - tc;

  if (orePrice < 0) orePrice = 0;



  document.getElementById('orePrice').innerHTML = orePrice.toFixed(0) + '<span class="unit">元/吨</span>';

  document.getElementById('breakdown').textContent = formula + ' - TC ' + tc + ' = ' + orePrice.toFixed(0) + ' 元/吨';



  highlightTableRow(grade);

  updatePresetButtons(grade);

}



function highlightTableRow(grade) {

  var rows = document.querySelectorAll('#coeffTable tr');

  rows.forEach(function(r) { r.classList.remove('current'); });

  var rounded = Math.round(grade * 10) / 10;

  rows.forEach(function(r) {

    var cells = r.querySelectorAll('td');

    for (var i = 0; i < cells.length; i += 2) {

      if (cells[i] && cells[i].textContent && parseFloat(cells[i].textContent) === rounded) {

        r.classList.add('current');

      }

    }

  });

}



function updatePresetButtons(grade) {

  var buttons = document.querySelectorAll('#gradePresets button');

  buttons.forEach(function(btn) {

    var g = parseFloat(btn.textContent);

    if (Math.abs(g - grade) < 0.03) {

      btn.classList.add('active');

    } else {

      btn.classList.remove('active');

    }

  });

}



// ===== Price Fetch =====

function fetchPrices(force) {

  if (force) {

    document.getElementById('priceDisplay').innerHTML = '<span class="spinner"></span>';

    document.getElementById('priceTime').textContent = '正在获取最新价格...';

  }



  fetch('data/price.json?_=' + Date.now())

    .then(function(r) { return r.json(); })

    .then(function(d) {

      if (!manualOverride && d.price && d.price > 0) {

        niPrice = d.price;

      }

      document.getElementById('priceDisplay').innerHTML = niPrice.toLocaleString() + '<span class="unit">元/吨</span>';

      var metaText = (d.date || d.updated_at || '') + ' · ' + (d.source || 'SMM');

      if (d.smm_high && d.smm_low) {

        metaText += ' | ' + d.smm_low + '~' + d.smm_high;

      }

      if (!manualOverride) {

        document.getElementById('priceTime').textContent = metaText;

        var dot = document.getElementById('statusDot');

        if (dot) dot.style.background = '#4caf50';

      }

      calc();

    })

    .catch(function() {

      document.getElementById('priceDisplay').innerHTML = niPrice.toLocaleString() + '<span class="unit">元/吨</span>';

      if (!manualOverride) {

        document.getElementById('priceTime').innerHTML = '<span class="price-error">离线 · SMM参考价</span>';

        var dot = document.getElementById('statusDot');

        if (dot) dot.style.background = '#e05555';

      }

      calc();

    });

}



function setManualPrice() {

  var val = parseFloat(document.getElementById('manualPriceInput').value);

  if (val > 0) {

    niPrice = val;

    manualOverride = true;

    document.getElementById('priceDisplay').innerHTML = val.toLocaleString() + '<span class="unit">元/吨</span>';

    document.getElementById('priceTime').textContent = '手动输入价格';

    var dot = document.getElementById('statusDot');

    if (dot) dot.style.background = '#daa520';

    calc();

  }

}



// ===== Coeff Table =====

function buildCoeffTable() {

  var table = document.getElementById('coeffTable');

  var coeffTable = getCoeffTable();

  var label = currentOreType === 'laterite' ? '红土镍矿' : '硫化镍矿';

  var html = '<tr><th>Ni% (' + label + ')</th><th>系数</th><th>Ni% (' + label + ')</th><th>系数</th></tr>';

  var half = Math.ceil(coeffTable.length / 2);

  for (var i = 0; i < half; i++) {

    var left = coeffTable[i];

    var right = coeffTable[i + half];

    html += '<tr><td>' + left[0] + '%</td><td>' + left[1] + '%</td>';

    if (right) {

      html += '<td>' + right[0] + '%</td><td>' + right[1] + '%</td>';

    } else {

      html += '<td></td><td></td>';

    }

    html += '</tr>';

  }

  table.innerHTML = html;

}



function toggleTable() {

  var wrap = document.getElementById('coeffTableWrap');

  wrap.classList.toggle('open');

}



// ===== Init =====

function init() {

  buildPresets();

  buildCoeffTable();

  fetchPrices();

  fetchFxRate();

  calc();

  setInterval(fetchPrices, 60000);

  setInterval(fetchFxRate, 600000);

}



init();

</script>

</body>

</html>
